<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CycleDash Pro - Compressed HUD</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root { --sat: env(safe-area-inset-top, 0px); --sab: env(safe-area-inset-bottom, 0px); }
        body, html { margin: 0; padding: 0; height: 100svh; width: 100%; overflow: hidden; background: #1a1a1a; font-family: -apple-system, system-ui, sans-serif; }
        #container { display: flex; flex-direction: column; height: 100svh; width: 100vw; }
        
        /* Compressed HUD height to 60px and tighter padding */
        #hud-header { background: #222; color: white; padding-top: var(--sat); display: grid; grid-template-columns: 1fr 1.1fr 1fr; border-bottom: 1px solid #444; flex-shrink: 0; z-index: 1000; height: 60px; }
        .hud-column { display: flex; flex-direction: column; padding: 0px 10px; justify-content: center; }
        .data-row { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #333; padding: 0px 0; line-height: 1.2; }
        .label { font-size: 9px; font-weight: bold; color: #888; text-transform: uppercase; }
        .val-text { font-size: 17px; font-weight: bold; font-family: monospace; color: #fff; }

        #map { flex: 1; background: #111; position: relative; width: 100%; z-index: 1; overflow: hidden; }
        .leaflet-map-pane { transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        #compass-ui { position: absolute; top: 10px; left: 10px; z-index: 2000; width: 34px; height: 34px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #555; pointer-events: none; }
        #needle { width: 2px; height: 24px; background: #e74c3c; position: relative; transition: transform 0.8s; }
        #needle::after { content: ''; position: absolute; bottom: 0; left: 0; width: 2px; height: 50%; background: #fff; }

        #bottom-tray { display: flex; height: 140px; background: #fff; border-top: 2px solid #333; padding-bottom: var(--sab); flex-shrink: 0; width: 100%; z-index: 1000; box-sizing: border-box; }
        #chart-section { flex: 1; min-width: 0; position: relative; padding: 5px; height: 100%; box-sizing: border-box; }
        #action-section { flex: 0 0 90px; display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; background: #ececec; border-left: 1px solid #ccc; }
        
        .action-btn { font-size: 9px; cursor: pointer; text-align: center; width: 80px; padding: 8px 0; background: #fff; border: 1px solid #999; border-radius: 4px; font-weight: bold; color: #333; }
        #recenter-btn { background: #3498db; color: white; border: none; display: none; position: absolute; top: 10px; right: 10px; z-index: 2000; width: auto; padding: 8px 15px; opacity: 0; transition: opacity 0.5s ease; }
        #reset-btn { background: #fee; color: #c0392b; border: 1px solid #fcc; }
        #rev-btn { background: #e8f4fd; color: #2980b9; border: 1px solid #abd4ed; }
        #status { position: absolute; bottom: 8px; left: 8px; z-index: 2000; font-size: 10px; color: #2ecc71; text-shadow: 1px 1px 1px #000; font-weight: bold; }
        canvas { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

<div id="container">
    <div id="hud-header">
        <div class="hud-column">
            <div class="data-row"><span class="label">MPH</span><span class="val-text" id="speed-val">0.0</span></div>
            <div class="data-row"><span class="label">REM</span><span class="val-text" id="remain-val">0.0</span></div>
        </div>
        <div class="hud-column">
            <div class="data-row"><span class="label">TIME</span><span class="val-text" id="time-val">12:00p</span></div>
            <div class="data-row"><span class="label">HDG</span><span class="val-text" id="heading-val">0°</span></div>
        </div>
        <div class="hud-column">
            <div class="data-row"><span class="label">ELV</span><span class="val-text" id="elev-val">---</span></div>
            <div class="data-row"><span class="label">GRD</span><span class="val-text" id="grade-val">0.0</span></div>
        </div>
    </div>

    <div id="map">
        <div id="compass-ui"><div id="needle"></div></div>
        <div id="status">GPS: WAITING</div>
        <button class="action-btn" id="recenter-btn">RECENTER</button>
    </div>

    <div id="bottom-tray">
        <div id="chart-section"><canvas id="elevationChart"></canvas></div>
        <div id="action-section">
            <label class="action-btn">LOAD <input type="file" id="route-upload" accept=".kml,.kmz" style="display:none"></label>
            <button class="action-btn" id="rev-btn">REVERSE</button>
            <button class="action-btn" id="fs-btn">FULL</button>
            <button class="action-btn" id="reset-btn">RESET</button>
        </div>
    </div>
</div>

<script>
    let map, chart, userMarker, snappedMarker, startMarker, endMarker, routeGeoJson, kmlRouteLine;
    let isFollowing = true, totalDist = 0, routeData = [];
    let breadcrumbDots = [];
    let lastLat, lastLng, lastUpdateTime = 0;
    const METERS_TO_FEET = 3.28084, MPS_TO_MPH = 2.23694, WINDOW_MI = 0.25, DEFAULT_ZOOM = 16;
    const DOT_TTL = 5 * 60 * 1000;

    function updateTime() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'p' : 'a';
        hours = hours % 12;
        hours = hours ? hours : 12; 
        document.getElementById('time-val').innerText = `${hours}:${minutes}${ampm}`;
    }

    function init() {
        setInterval(updateTime, 1000);
        updateTime();

        map = L.map('map', { zoomControl: false, doubleClickZoom: false }).setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png').addTo(map);

        startMarker = L.circleMarker([0,0], { stroke: false, fillOpacity: 1, fillColor: '#2ecc71', radius: 8 }).addTo(map);
        endMarker = L.circleMarker([0,0], { stroke: false, fillOpacity: 1, fillColor: '#e74c3c', radius: 8 }).addTo(map);
        snappedMarker = L.circleMarker([0,0], { stroke: false, fillOpacity: 1, fillColor: '#f39c12', radius: 6 }).addTo(map);
        userMarker = L.circleMarker([0,0], { stroke: false, fillOpacity: 1, fillColor: '#3498db', radius: 7, zIndexOffset: 1000 }).addTo(map);

        const ctx = document.getElementById('elevationChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { datasets: [
                { id: 'route', data: [], borderWidth: 4.5, pointRadius: 0, tension: 0.1, fill: false, 
                  segment: { borderColor: ctx => {
                    const p1 = ctx.p0.raw, p2 = ctx.p1.raw;
                    if (!p1 || !p2) return '#27ae60';
                    const grade = ((p2.y - p1.y) / ((p2.x - p1.x) * 5280)) * 100;
                    return grade >= 6 ? '#e74c3c' : (grade >= 3 ? '#f1c40f' : '#27ae60');
                }}}, 
                { id: 'user-pos', data: [], pointRadius: 7, pointBackgroundColor: '#f39c12', pointBorderColor: '#fff', pointBorderWidth: 2, showLine: false }
            ]},
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { legend: false }, 
                animation: false,
                layout: { padding: { bottom: 0, top: 5 } },
                scales: { 
                    x: { type: 'linear', ticks: { display: true, font: { size: 9 }, maxRotation: 0, padding: 0 }, grid: { display: false } }, 
                    y: { grace: '20%', ticks: { font: { size: 9 }, padding: 2 } } 
                } 
            }
        });

        map.on('dragstart', () => { 
            isFollowing = false; 
            const btn = document.getElementById('recenter-btn');
            btn.style.display = 'block';
            setTimeout(() => btn.style.opacity = '1', 10);
        });

        map.on('dblclick', () => { map.setZoom(DEFAULT_ZOOM); });

        document.getElementById('recenter-btn').onclick = function() {
            isFollowing = true;
            this.style.opacity = '0';
            setTimeout(() => this.style.display = 'none', 500);
            if(lastLat && lastLng) map.panTo([lastLat, lastLng]);
        };

        document.getElementById('fs-btn').onclick = () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
            else document.exitFullscreen();
        };

        document.getElementById('reset-btn').onclick = () => { localStorage.clear(); location.reload(); };

        document.getElementById('rev-btn').onclick = () => {
            if (!routeGeoJson) return;
            const coords = [...routeGeoJson.geometry.coordinates].reverse();
            processRoutePoints(coords);
        };

        document.getElementById('route-upload').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.name.toLowerCase().endsWith('.kmz')) {
                const zip = await JSZip.loadAsync(file);
                const kmlFile = Object.values(zip.files).find(f => f.name.toLowerCase().endsWith('.kml'));
                if (kmlFile) {
                    const kmlText = await kmlFile.async("string");
                    loadKml(kmlText);
                }
            } else {
                const reader = new FileReader();
                reader.onload = (ev) => { loadKml(ev.target.result); };
                reader.readAsText(file);
            }
        };

        const saved = localStorage.getItem('cycling_route_foss');
        if (saved) loadKml(saved);
        startGPS();
    }

    function rotateMap(heading) {
        if (heading === null || heading === undefined) return;
        const pane = map.getPane('mapPane');
        pane.style.transformOrigin = "center";
        pane.style.transform = `rotate(${-heading}deg)`;
        document.getElementById('needle').style.transform = `rotate(${-heading}deg)`;
        document.getElementById('heading-val').innerText = Math.round(heading) + "°";
    }

    function updateBreadcrumbs() {
        const now = Date.now();
        if (lastLat && lastLng) {
            const dot = L.circleMarker([lastLat, lastLng], { radius: 4, stroke: false, fillColor: '#3498db', fillOpacity: 0.5 }).addTo(map);
            breadcrumbDots.push({ marker: dot, time: now });
        }
        breadcrumbDots = breadcrumbDots.filter(d => {
            if (now - d.time > DOT_TTL) { map.removeLayer(d.marker); return false; }
            return true;
        });
    }

    function startGPS() {
        navigator.geolocation.watchPosition((pos) => {
            const now = Date.now();
            if (now - lastUpdateTime < 5000) return;
            lastUpdateTime = now;

            const { latitude: lat, longitude: lng, speed, altitude, heading } = pos.coords;
            lastLat = lat; lastLng = lng;
            const curElev = altitude ? Math.round(altitude * METERS_TO_FEET) : 0;
            
            document.getElementById('status').innerText = "GPS: OK";
            document.getElementById('speed-val').innerText = speed ? (speed * MPS_TO_MPH).toFixed(1) : "0.0";
            document.getElementById('elev-val').innerText = curElev || "---";
            
            userMarker.setLatLng([lat, lng]);
            updateBreadcrumbs();

            if (isFollowing) {
                map.panTo([lat, lng]);
                if (heading !== null) rotateMap(heading);
            }

            updateRouteContext(lat, lng);
        }, null, { enableHighAccuracy: true });
    }

    function updateRouteContext(lat, lng) {
        if (!routeGeoJson) return;
        const userPt = turf.point([lng, lat]);
        const snapped = turf.nearestPointOnLine(routeGeoJson, userPt, {units: 'miles'});
        const curDist = snapped.properties.location;
        snappedMarker.setLatLng([snapped.geometry.coordinates[1], snapped.geometry.coordinates[0]]);

        const step = 0.01, e1 = getElevAtDist(curDist), e2 = getElevAtDist(curDist + step);
        const grade = ((e2 - e1) / (step * 5280)) * 100;
        document.getElementById('grade-val').innerText = isFinite(grade) ? grade.toFixed(1) : "0.0";
        document.getElementById('remain-val').innerText = Math.max(0, totalDist - curDist).toFixed(1);

        const minX = curDist - (WINDOW_MI * 0.25); 
        const maxX = curDist + (WINDOW_MI * 0.75);
        chart.options.scales.x.min = minX; 
        chart.options.scales.x.max = maxX;
        chart.data.datasets[1].data = [{ x: curDist, y: e1 }];

        const visible = routeData.filter(p => p.x >= minX && p.x <= maxX);
        if (visible.length > 0) {
            const eArr = visible.map(p => p.y);
            chart.options.scales.y.min = Math.min(...eArr) - 20; 
            chart.options.scales.y.max = Math.max(...eArr) + 20;
        }
        chart.update('none');
    }

    function getElevAtDist(targetDist) {
        if (routeData.length === 0) return 0;
        const target = Math.max(0, Math.min(targetDist, totalDist));
        for (let i = 0; i < routeData.length - 1; i++) {
            if (target >= routeData[i].x && target <= routeData[i+1].x) {
                const ratio = (target - routeData[i].x) / (routeData[i+1].x - routeData[i].x);
                return routeData[i].y + ratio * (routeData[i+1].y - routeData[i].y);
            }
        }
        return routeData[routeData.length - 1].y;
    }

    function processRoutePoints(allCoords) {
        const processed = allCoords.map((c, i) => {
            const win = allCoords.slice(Math.max(0, i-2), Math.min(allCoords.length, i+3));
            const avgElev = win.reduce((sum, pt) => sum + (pt[2] || 0), 0) / win.length;
            const elev = isNaN(avgElev) ? 0 : avgElev;
            return [c[0], c[1], elev];
        });

        routeGeoJson = { type: "Feature", geometry: { type: "LineString", coordinates: processed } };
        
        let d = 0; routeData = [{x: 0, y: processed[0][2]}];
        for(let i=1; i < processed.length; i++) {
            d += turf.distance(turf.point(processed[i-1]), turf.point(processed[i]), {units:'miles'});
            routeData.push({x: d, y: processed[i][2]});
        }
        totalDist = d;

        startMarker.setLatLng([processed[0][1], processed[0][0]]);
        endMarker.setLatLng([processed[processed.length-1][1], processed[processed.length-1][0]]);
        
        chart.data.datasets[0].data = routeData;
        chart.update();

        if (kmlRouteLine) map.removeLayer(kmlRouteLine);
        kmlRouteLine = L.polyline(processed.map(c => [c[1], c[0]]), { color: '#000', weight: 3, opacity: 0.8, dashArray: '8, 12' }).addTo(map);
        
        if (lastLat && lastLng) updateRouteContext(lastLat, lastLng);
    }

    function loadKml(xmlString) {
        try {
            const dom = new DOMParser().parseFromString(xmlString, "text/xml");
            const geojson = toGeoJSON.kml(dom);
            let allCoords = [];
            geojson.features.forEach(f => {
                if (f.geometry.type === 'LineString') allCoords = allCoords.concat(f.geometry.coordinates);
                else if (f.geometry.type === 'MultiLineString') f.geometry.coordinates.forEach(line => { allCoords = allCoords.concat(line); });
            });
            if (allCoords.length === 0) return;
            localStorage.setItem('cycling_route_foss', xmlString);
            
            const coordsWithFeet = allCoords.map(c => [c[0], c[1], (c[2] || 0) * METERS_TO_FEET]);
            processRoutePoints(coordsWithFeet);

            setTimeout(() => { map.invalidateSize(); }, 500);
        } catch(e) { console.error("Parse Error", e); }
    }
    window.onload = init;
</script>
</body>
</html>

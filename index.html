<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CycleDash Pro - Dashed Route</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>

    <style>
        :root { --sat: env(safe-area-inset-top, 0px); --sab: env(safe-area-inset-bottom, 0px); }
        body, html { margin: 0; padding: 0; height: 100svh; width: 100%; overflow: hidden; background: #1a1a1a; font-family: -apple-system, system-ui, sans-serif; }
        #container { display: flex; flex-direction: column; height: 100svh; width: 100vw; position: relative; }
        
        #hud-header { background: #222; color: white; padding-top: var(--sat); display: grid; grid-template-columns: 1fr 1.1fr 1fr; border-bottom: 1px solid #444; flex-shrink: 0; z-index: 2000; height: 60px; }
        #bottom-tray { display: flex; height: 140px; background: #fff; border-top: 2px solid #333; padding-bottom: var(--sab); flex-shrink: 0; width: 100%; z-index: 2000; }
        
        #map-viewport { flex: 1; position: relative; overflow: hidden; background: #111; z-index: 1; }

        /* 300% Overscan for offset rotation coverage */
        #map { 
            position: absolute;
            top: -100%; 
            left: -100%; 
            width: 300%; 
            height: 300%; 
            transition: transform 0.1s linear; 
            will-change: transform;
        }

        .hud-column { display: flex; flex-direction: column; padding: 0px 10px; justify-content: center; }
        .data-row { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #333; line-height: 1.2; }
        .label { font-size: 9px; font-weight: bold; color: #888; text-transform: uppercase; }
        .val-text { font-size: 17px; font-weight: bold; font-family: monospace; color: #fff; }

        #compass-ui { position: absolute; top: 10px; left: 10px; z-index: 3000; width: 44px; height: 44px; background: rgba(0,0,0,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; cursor: pointer; }
        #needle { width: 3px; height: 30px; background: #e74c3c; position: relative; }
        #needle::after { content: ''; position: absolute; bottom: 0; left: 0; width: 3px; height: 50%; background: #fff; }

        #chart-section { flex: 1; min-width: 0; position: relative; padding: 5px; }
        #action-section { flex: 0 0 90px; display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; background: #ececec; border-left: 1px solid #ccc; }
        .action-btn { font-size: 9px; cursor: pointer; text-align: center; width: 80px; padding: 8px 0; background: #fff; border: 1px solid #999; border-radius: 4px; font-weight: bold; color: #333; }
        #status { position: absolute; bottom: 8px; left: 8px; z-index: 3000; font-size: 10px; color: #2ecc71; font-weight: bold; font-family: monospace; }
        #recenter-btn { position: absolute; top: 10px; right: 10px; z-index: 3000; background: #3498db; color: white; border: none; display: none; padding: 10px 15px; font-size: 11px; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

<div id="container">
    <div id="hud-header">
        <div class="hud-column"><div class="data-row"><span class="label">MPH</span><span class="val-text" id="speed-val">0.0</span></div><div class="data-row"><span class="label">REM</span><span class="val-text" id="remain-val">---</span></div></div>
        <div class="hud-column"><div class="data-row"><span class="label">TIME</span><span class="val-text" id="time-val">--:--</span></div><div class="data-row"><span class="label">HDG</span><span class="val-text" id="heading-val">0°</span></div></div>
        <div class="hud-column"><div class="data-row"><span class="label">ELV</span><span class="val-text" id="elev-val">---</span></div><div class="data-row"><span class="label">GRD</span><span class="val-text" id="grade-val">---</span></div></div>
    </div>

    <div id="map-viewport">
        <div id="map"></div>
        <div id="compass-ui"><div id="needle"></div></div>
        <div id="status">GPS: WAITING...</div>
        <button id="recenter-btn">RECENTER</button>
    </div>

    <div id="bottom-tray">
        <div id="chart-section"><canvas id="elevationChart"></canvas></div>
        <div id="action-section">
            <label class="action-btn">LOAD <input type="file" id="route-upload" accept=".kml,.kmz" style="display:none"></label>
            <button class="action-btn" id="rev-btn">REVERSE</button>
            <button class="action-btn" id="fs-btn">FULL</button>
            <button class="action-btn" id="reset-btn">RESET</button>
        </div>
    </div>
</div>

<script>
    let map, chart, userMarker, snappedMarker;
    let masterCoords = [], routeGeoJson = null, kmlRouteLine = null, routeData = [];
    let isFollowing = true, isCourseUp = true, lastLat = 0, lastLng = 0, routeBearing = 0, currentRotation = 0;
    
    const METERS_TO_FEET = 3.28084, MPS_TO_MPH = 2.23694, WINDOW_MI = 0.25;

    function renderLoop() {
        if (lastLat !== 0) {
            userMarker.setLatLng([lastLat, lastLng]);
            const target = isCourseUp ? routeBearing : 0;
            let diff = target - currentRotation;
            while (diff < -180) diff += 360; while (diff > 180) diff -= 360;
            currentRotation += diff * 0.1; 

            const mapEl = document.getElementById('map');
            const pivotY = isCourseUp ? 55.555 : 50; 
            mapEl.style.transformOrigin = `50% ${pivotY}%`;
            mapEl.style.transform = `rotate(${-currentRotation}deg)`;
            
            document.getElementById('needle').style.transform = `rotate(${routeBearing - currentRotation}deg)`;
            document.getElementById('heading-val').innerText = Math.round((routeBearing + 360) % 360) + "°";

            if (isFollowing) {
                const viewportH = map.getSize().y;
                const offsetPx = isCourseUp ? (viewportH / 6) : 0;
                map.setView([lastLat, lastLng], map.getZoom(), { animate: false });
                if (offsetPx !== 0) map.panBy([0, -offsetPx], { animate: false });
            }
        }
        requestAnimationFrame(renderLoop);
    }

    function init() {
        map = L.map('map', { zoomControl: false, preferCanvas: true, doubleClickZoom: false }).setView([0, 0], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png').addTo(map);
        
        userMarker = L.circleMarker([0,0], { stroke: true, color: '#fff', weight: 2, fillOpacity: 1, fillColor: '#3498db', radius: 7 }).addTo(map);
        snappedMarker = L.circleMarker([0,0], { stroke: false, fillOpacity: 1, fillColor: '#f39c12', radius: 6 }).addTo(map);

        const ctx = document.getElementById('elevationChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { datasets: [{ id: 'route', data: [], fill: true, stepped: 'before', pointRadius: 0, borderWidth: 2, borderColor: '#27ae60', backgroundColor: '#27ae6044' }, { id: 'user-pos', data: [], pointRadius: 7, pointBackgroundColor: '#f39c12', pointBorderColor: '#fff', pointBorderWidth: 2, showLine: false }]},
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: false }, animation: false, scales: { x: { type: 'linear' }, y: { grace: '10%' }}}
        });

        setupListeners();
        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude, speed, altitude, accuracy } = pos.coords;
            lastLat = latitude; lastLng = longitude;
            document.getElementById('status').innerText = `GPS: ±${Math.round(accuracy * METERS_TO_FEET)}FT`;
            document.getElementById('speed-val').innerText = speed ? (speed * MPS_TO_MPH).toFixed(1) : "0

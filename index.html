<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CycleDash Pro - Perfect Alignment</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>

    <style>
        :root { --sat: env(safe-area-inset-top, 0px); --sab: env(safe-area-inset-bottom, 0px); }
        body, html { margin: 0; padding: 0; height: 100svh; width: 100%; overflow: hidden; background: #1a1a1a; font-family: -apple-system, system-ui, sans-serif; }
        #container { display: flex; flex-direction: column; height: 100svh; width: 100vw; position: relative; }
        
        #hud-header { background: #222; color: white; padding-top: var(--sat); display: grid; grid-template-columns: 1fr 1.1fr 1fr; border-bottom: 1px solid #444; flex-shrink: 0; z-index: 2000; height: 60px; }
        #bottom-tray { display: flex; height: 140px; background: #fff; border-top: 2px solid #333; padding-bottom: var(--sab); flex-shrink: 0; width: 100%; z-index: 2000; }
        
        #map-viewport { flex: 1; position: relative; overflow: hidden; background: #111; z-index: 1; }

        /* The 300% canvas allows for deep pivot offsets without showing edges */
        #map { 
            position: absolute;
            top: -100%; 
            left: -100%; 
            width: 300%; 
            height: 300%; 
            transition: transform 0.1s linear; 
            will-change: transform;
        }

        /* HUD Styles */
        .hud-column { display: flex; flex-direction: column; padding: 0px 10px; justify-content: center; }
        .data-row { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #333; line-height: 1.2; }
        .label { font-size: 9px; font-weight: bold; color: #888; text-transform: uppercase; }
        .val-text { font-size: 17px; font-weight: bold; font-family: monospace; color: #fff; }
        #compass-ui { position: absolute; top: 10px; left: 10px; z-index: 3000; width: 44px; height: 44px; background: rgba(0,0,0,0.8); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; cursor: pointer; }
        #needle { width: 3px; height: 30px; background: #e74c3c; position: relative; }
        #needle::after { content: ''; position: absolute; bottom: 0; left: 0; width: 3px; height: 50%; background: #fff; }
        #status { position: absolute; bottom: 8px; left: 8px; z-index: 3000; font-size: 10px; color: #2ecc71; font-weight: bold; font-family: monospace; }
        #recenter-btn { position: absolute; top: 10px; right: 10px; z-index: 3000; background: #3498db; color: white; border: none; display: none; padding: 10px 15px; font-size: 11px; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

<div id="container">
    <div id="hud-header">
        <div class="hud-column"><div class="data-row"><span class="label">MPH</span><span class="val-text" id="speed-val">0.0</span></div><div class="data-row"><span class="label">REM</span><span class="val-text" id="remain-val">---</span></div></div>
        <div class="hud-column"><div class="data-row"><span class="label">TIME</span><span class="val-text" id="time-val">--:--</span></div><div class="data-row"><span class="label">HDG</span><span class="val-text" id="heading-val">0°</span></div></div>
        <div class="hud-column"><div class="data-row"><span class="label">ELV</span><span class="val-text" id="elev-val">---</span></div><div class="data-row"><span class="label">GRD</span><span class="val-text" id="grade-val">---</span></div></div>
    </div>
    <div id="map-viewport">
        <div id="map"></div>
        <div id="compass-ui"><div id="needle"></div></div>
        <div id="status">GPS: WAITING...</div>
        <button id="recenter-btn">RECENTER</button>
    </div>
    <div id="bottom-tray">
        <div id="chart-section" style="flex:1;"><canvas id="elevationChart"></canvas></div>
        <div id="action-section" style="flex:0 0 90px; display:flex; flex-direction:column; justify-content:space-evenly; align-items:center; background:#eee;">
            <label class="action-btn" style="font-size:9px; cursor:pointer; padding:5px; border:1px solid #999; border-radius:3px;">LOAD<input type="file" id="route-upload" accept=".kml" style="display:none"></label>
            <button id="rev-btn" style="font-size:9px; width:70px;">REVERSE</button>
            <button id="reset-btn" style="font-size:9px; width:70px;">RESET</button>
        </div>
    </div>
</div>

<script>
    let map, chart, userMarker;
    let masterCoords = [], routeGeoJson = null, routeData = [];
    let isFollowing = true, isCourseUp = true, lastLat = 0, lastLng = 0, routeBearing = 0, currentRotation = 0;
    const METERS_TO_FEET = 3.28084, MPS_TO_MPH = 2.23694;

    function renderLoop() {
        if (lastLat !== 0) {
            userMarker.setLatLng([lastLat, lastLng]);
            
            // 1. Calculate Rotation
            const target = isCourseUp ? routeBearing : 0;
            let diff = target - currentRotation;
            while (diff < -180) diff += 360; while (diff > 180) diff -= 360;
            currentRotation += diff * 0.15; // Smoothler follow

            // 2. Apply CSS Pivot and Rotation
            // On 300% canvas, 50% is horizontal center.
            // 55.55% is one-third from bottom of the viewport middle-third.
            const pivotY = isCourseUp ? 55.555 : 50; 
            const mapEl = document.getElementById('map');
            mapEl.style.transformOrigin = `50% ${pivotY}%`;
            mapEl.style.transform = `rotate(${-currentRotation}deg)`;
            
            // 3. Update UI
            document.getElementById('needle').style.transform = `rotate(${routeBearing - currentRotation}deg)`;
            document.getElementById('heading-val').innerText = Math.round((routeBearing + 360) % 360) + "°";

            // 4. Update Map Position
            if (isFollowing) {
                const viewportH = map.getSize().y;
                // Move camera up by 1/6th of screen to push marker 1/6th down from center (total 1/3 from bottom)
                const offsetPx = isCourseUp ? (viewportH / 6) : 0;
                map.setView([lastLat, lastLng], map.getZoom(), { animate: false });
                if (offsetPx !== 0) map.panBy([0, -offsetPx], { animate: false });
            }
        }
        requestAnimationFrame(renderLoop);
    }

    function init() {
        map = L.map('map', { zoomControl: false, preferCanvas: true }).setView([0, 0], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png').addTo(map);
        
        userMarker = L.circleMarker([0,0], { color: '#fff', weight: 2, fillColor: '#3498db', fillOpacity: 1, radius: 8 }).addTo(map);
        
        setupChart();
        setupListeners();
        
        const saved = localStorage.getItem('cycling_route_foss');
        if (saved) loadKml(saved);

        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude, speed, altitude, accuracy } = pos.coords;
            lastLat = latitude; lastLng = longitude;
            document.getElementById('status').innerText = `GPS: ±${Math.round(accuracy * METERS_TO_FEET)}FT`;
            document.getElementById('speed-val').innerText = speed ? (speed * MPS_TO_MPH).toFixed(1) : "0.0";
            updateRouteContext(latitude, longitude);
        }, null, { enableHighAccuracy: true });

        requestAnimationFrame(renderLoop);
    }

    function updateRouteContext(lat, lng) {
        if (!routeGeoJson) return;
        const pt = turf.point([lng, lat]);
        const snapped = turf.nearestPointOnLine(routeGeoJson, pt, {units: 'miles'});
        const curDist = snapped.properties.location;
        const pointAhead = turf.along(routeGeoJson, curDist + 0.02, {units: 'miles'});
        routeBearing = turf.bearing(turf.point(snapped.geometry.coordinates), pointAhead);
        
        document.getElementById('remain-val').innerText = (routeData[routeData.length-1].x - curDist).toFixed(1);
        chart.options.scales.x.min = curDist - 0.05;
        chart.options.scales.x.max = curDist + 0.20;
        chart.update('none');
    }

    function loadKml(xml) {
        const dom = new DOMParser().parseFromString(xml, "text/xml");
        const geojson = toGeoJSON.kml(dom);
        let coords = geojson.features[0].geometry.coordinates;
        routeGeoJson = { type: "Feature", geometry: { type: "LineString", coordinates: coords }};
        
        routeData = []; let d = 0;
        for(let i=0; i<coords.length; i++){
            if(i>0) d += turf.distance(turf.point(coords[i-1]), turf.point(coords[i]), {units:'miles'});
            routeData.push({x: d, y: (coords[i][2]||0)*METERS_TO_FEET});
        }
        chart.data.datasets[0].data = routeData;
        chart.update();
        L.polyline(coords.map(c => [c[1], c[0]]), {color:'#000', weight:5, opacity:0.5}).addTo(map);
        localStorage.setItem('cycling_route_foss', xml);
    }

    function setupChart() {
        chart = new Chart(document.getElementById('elevationChart'), {
            type: 'line',
            data: { datasets: [{ data: [], fill: true, borderColor: '#27ae60', backgroundColor: '#27ae6044', pointRadius: 0 }]},
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: false }, scales: { x: { type: 'linear', display: false }, y: { display: false }}}
        });
    }

    function setupListeners() {
        document.getElementById('compass-ui').onclick = () => { isCourseUp = !isCourseUp; };
        document.getElementById('recenter-btn').onclick = () => { isFollowing = true; document.getElementById('recenter-btn').style.display='none'; };
        map.on('dragstart', () => { isFollowing = false; document.getElementById('recenter-btn').style.display='block'; });
        document.getElementById('route-upload').onchange = (e) => {
            const r = new FileReader(); r.onload = (ev) => loadKml(ev.target.result); r.readAsText(e.target.files[0]);
        };
    }
    
    window.onload = init;
</script>
</body>
</html>

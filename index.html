<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CycleDash Pro - Nav View</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>

    <style>
        :root { --sat: env(safe-area-inset-top, 0px); --sab: env(safe-area-inset-bottom, 0px); }
        body, html { margin: 0; padding: 0; height: 100svh; width: 100%; overflow: hidden; background: #1a1a1a; font-family: -apple-system, system-ui, sans-serif; }
        #container { display: flex; flex-direction: column; height: 100svh; width: 100vw; position: relative; }
        
        #hud-header { background: #222; color: white; padding-top: var(--sat); display: grid; grid-template-columns: 1fr 1.1fr 1fr; border-bottom: 1px solid #444; flex-shrink: 0; z-index: 2000; height: 60px; }
        #bottom-tray { display: flex; height: 140px; background: #fff; border-top: 2px solid #333; padding-bottom: var(--sab); flex-shrink: 0; width: 100%; z-index: 2000; }
        
        #map-viewport { 
            flex: 1; 
            position: relative; 
            overflow: hidden; 
            background: #111;
            z-index: 1;
        }

        #map { 
            position: absolute;
            top: -50%; 
            left: -50%; 
            width: 200%; 
            height: 200%; 
            transition: transform 0.1s linear; 
            will-change: transform;
        }

        .hud-column { display: flex; flex-direction: column; padding: 0px 10px; justify-content: center; }
        .data-row { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #333; padding: 0px 0; line-height: 1.2; }
        .label { font-size: 9px; font-weight: bold; color: #888; text-transform: uppercase; }
        .val-text { font-size: 17px; font-weight: bold; font-family: monospace; color: #fff; }

        #compass-ui { position: absolute; top: 10px; left: 10px; z-index: 3000; width: 44px; height: 44px; background: rgba(0,0,0,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; cursor: pointer; }
        #needle { width: 3px; height: 30px; background: #e74c3c; position: relative; }
        #needle::after { content: ''; position: absolute; bottom: 0; left: 0; width: 3px; height: 50%; background: #fff; }

        #chart-section { flex: 1; min-width: 0; position: relative; padding: 5px; }
        #action-section { flex: 0 0 90px; display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; background: #ececec; border-left: 1px solid #ccc; }
        .action-btn { font-size: 9px; cursor: pointer; text-align: center; width: 80px; padding: 8px 0; background: #fff; border: 1px solid #999; border-radius: 4px; font-weight: bold; color: #333; }
        #status { position: absolute; bottom: 8px; left: 8px; z-index: 3000; font-size: 10px; color: #2ecc71; font-weight: bold; font-family: monospace; }
        #recenter-btn { position: absolute; top: 10px; right: 10px; z-index: 3000; background: #3498db; color: white; border: none; display: none; padding: 10px 15px; font-size: 11px; font-weight: bold; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div id="container">
    <div id="hud-header">
        <div class="hud-column"><div class="data-row"><span class="label">MPH</span><span class="val-text" id="speed-val">0.0</span></div><div class="data-row"><span class="label">REM</span><span class="val-text" id="remain-val">---</span></div></div>
        <div class="hud-column"><div class="data-row"><span class="label">TIME</span><span class="val-text" id="time-val">--:--</span></div><div class="data-row"><span class="label">HDG</span><span class="val-text" id="heading-val">0°</span></div></div>
        <div class="hud-column"><div class="data-row"><span class="label">ELV</span><span class="val-text" id="elev-val">---</span></div><div class="data-row"><span class="label">GRD</span><span class="val-text" id="grade-val">---</span></div></div>
    </div>

    <div id="map-viewport">
        <div id="map"></div>
        <div id="compass-ui"><div id="needle"></div></div>
        <div id="status">GPS: WAITING...</div>
        <button id="recenter-btn">RECENTER</button>
    </div>

    <div id="bottom-tray">
        <div id="chart-section"><canvas id="elevationChart"></canvas></div>
        <div id="action-section">
            <label class="action-btn">LOAD <input type="file" id="route-upload" accept=".kml,.kmz" style="display:none"></label>
            <button class="action-btn" id="rev-btn">REVERSE</button>
            <button class="action-btn" id="fs-btn">FULL</button>
            <button class="action-btn" id="reset-btn">RESET</button>
        </div>
    </div>
</div>

<script>
    // --- SERVICE WORKER REGISTRATION (OFFLINE CACHE) ---
    if ('serviceWorker' in navigator) {
        const swCode = `const CACHE_NAME = 'cycledash-tiles-v1'; self.addEventListener('fetch', (e) => { if (e.request.url.includes('tile.openstreetmap.fr')) { e.respondWith(caches.match(e.request).then((res) => res || fetch(e.request).then((fRes) => caches.open(CACHE_NAME).then((c) => { c.put(e.request, fRes.clone()); return fRes; })))); } });`;
        const blob = new Blob([swCode], { type: 'text/javascript' });
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }

    let map, chart, userMarker, snappedMarker;
    let masterCoords = [], routeGeoJson = null, kmlRouteLine = null, routeData = [];
    let isFollowing = true, isCourseUp = true, lastValidLat = 0, lastValidLng = 0, targetHeading = 0, currentRotation = 0;
    let lastUpdateTime = 0;
    
    const DEFAULT_ZOOM = 16;
    const METERS_TO_FEET = 3.28084, MPS_TO_MPH = 2.23694, WINDOW_MI = 0.25;

    function updateTime() {
        const now = new Date(); let h = now.getHours(); const m = now.getMinutes().toString().padStart(2, '0');
        const x = h >= 12 ? 'p' : 'a'; h = h % 12 || 12;
        document.getElementById('time-val').innerText = `${h}:${m}${x}`;
    }

    function renderLoop() {
        const now = Date.now();
        if (lastValidLat !== 0) {
            userMarker.setLatLng([lastValidLat, lastValidLng]);
            
            // Rotation Smoothing
            let diff = targetHeading - currentRotation;
            while (diff < -180) diff += 360; while (diff > 180) diff -= 360;
            currentRotation += diff * 0.1; 

            const rotationAngle = isCourseUp ? -currentRotation : 0;
            const mapEl = document.getElementById('map');
            
            // Map Pivot Logic
            // We want the user at 1/3 from the bottom. 
            // In a viewport-relative context, that's roughly a 16.6% vertical offset from the center.
            const verticalOffsetPercent = isCourseUp ? 16.6 : 0; 
            mapEl.style.transformOrigin = `50% ${50 + verticalOffsetPercent}%`;
            mapEl.style.transform = `rotate(${rotationAngle}deg)`;
            
            document.getElementById('needle').style.transform = `rotate(${-currentRotation}deg)`;
            document.getElementById('heading-val').innerText = Math.round((currentRotation + 360) % 360) + "°";

            if (isFollowing) {
                // To keep marker at 1/3 height, we pan the map so the user coordinates 
                // are offset by 1/6th of the map's pixel height.
                const mapHeight = map.getSize().y;
                const offsetPx = isCourseUp ? (mapHeight / 6) : 0;
                map.setView([lastValidLat, lastValidLng], map.getZoom(), { animate: false });
                map.panBy([0, -offsetPx], { animate: false });
            }
        }
        requestAnimationFrame(renderLoop);
    }

    function handleGPSUpdate(pos) {
        lastUpdateTime = Date.now();
        const { latitude, longitude, speed, altitude, heading, accuracy } = pos.coords;
        document.getElementById('status').innerText = `GPS: ±${Math.round(accuracy * METERS_TO_FEET)}FT`;
        lastValidLat = latitude; lastValidLng = longitude;
        if (!routeGeoJson && heading !== null) targetHeading = heading;
        document.getElementById('speed-val').innerText = speed ? (speed * MPS_TO_MPH).toFixed(1) : "0.0";
        document.getElementById('elev-val').innerText = altitude ? Math.round(altitude * METERS_TO_FEET) : "---";
        updateRouteContext(latitude, longitude);
    }

    function init() {
        updateTime(); setInterval(updateTime, 1000);
        map = L.map('map', { zoomControl: false, preferCanvas: true, doubleClickZoom: false }).setView([0, 0], DEFAULT_ZOOM);
        L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', { crossOrigin: true }).addTo(map);
        map.invalidateSize();

        userMarker = L.circleMarker([0,0], { stroke: true, color: '#fff', weight: 2, fillOpacity: 1, fillColor: '#3498db', radius: 7, zIndexOffset: 1000 }).addTo(map);
        snappedMarker = L.circleMarker([0,0], { stroke: false, fillOpacity: 1, fillColor: '#f39c12', radius: 6 }).addTo(map);

        const ctx = document.getElementById('elevationChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { datasets: [{ id: 'route', data: [], fill: 'origin', stepped: 'before', pointRadius: 0, borderWidth: 2, segment: { borderColor: c => getSegCol(c), backgroundColor: c => getSegCol(c) + '88' }}, { id: 'user-pos', data: [], pointRadius: 7, pointBackgroundColor: '#f39c12', pointBorderColor: '#fff', pointBorderWidth: 2, showLine: false }]},
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: false }, animation: false, scales: { x: { type: 'linear' }, y: { grace: '10%' }}}
        });

        setupListeners();
        const saved = localStorage.getItem('cycling_route_foss');
        if (saved) loadKml(saved);
        requestAnimationFrame(renderLoop);
        navigator.geolocation.watchPosition(handleGPSUpdate, null, { enableHighAccuracy: true });
    }

    function getSegCol(ctx) {
        const p1 = ctx.p0.raw; const p2 = ctx.p1.raw;
        if (!p1 || !p2) return '#27ae60';
        const grade = ((p2.y - p1.y) / ((p2.x - p1.x) * 5280)) * 100;
        return grade >= 6 ? '#e74c3c' : (grade >= 3 ? '#f1c40f' : '#27ae60');
    }

    function processRoutePoints(sourceCoords) {
        routeData = []; totalDist = 0;
        const processed = sourceCoords.map(c => [c[0], c[1], (c[2] || 0) * METERS_TO_FEET]);
        routeGeoJson = { type: "Feature", geometry: { type: "LineString", coordinates: processed } };
        let d = 0; routeData.push({x: 0, y: processed[0][2]});
        for(let i=1; i < processed.length; i++) {
            d += turf.distance(turf.point(processed[i-1]), turf.point(processed[i]), {units:'miles'});
            routeData.push({x: d, y: processed[i][2]});
        }
        totalDist = d; chart.data.datasets[0].data = routeData; chart.update();
        if (kmlRouteLine) map.removeLayer(kmlRouteLine);
        kmlRouteLine = L.polyline(processed.map(c => [c[1], c[0]]), { color: '#000', weight: 4, opacity: 0.8, dashArray: '8, 12' }).addTo(map);
    }

    function updateRouteContext(lat, lng) {
        if (!routeGeoJson) return;
        const snapped = turf.nearestPointOnLine(routeGeoJson, turf.point([lng, lat]), {units: 'miles'});
        const curDist = snapped.properties.location;
        snappedMarker.setLatLng([snapped.geometry.coordinates[1], snapped.geometry.coordinates[0]]);
        const lookAheadDist = Math.min(totalDist, curDist + 0.02);
        const pointAhead = turf.along(routeGeoJson, lookAheadDist, {units: 'miles'});
        targetHeading = turf.bearing(turf.point(snapped.geometry.coordinates), turf.point(pointAhead.geometry.coordinates));
        const e1 = getElevAtDist(curDist);
        document.getElementById('remain-val').innerText = Math.max(0, totalDist - curDist).toFixed(1);
        chart.options.scales.x.min = curDist - (WINDOW_MI * 0.25);
        chart.options.scales.x.max = curDist + (WINDOW_MI * 0.75);
        chart.data.datasets[1].data = [{ x: curDist, y: e1 }];
        chart.update('none'); 
    }

    function getElevAtDist(t) {
        if (routeData.length === 0) return 0;
        const target = Math.max(0, Math.min(t, totalDist));
        for (let i = 0; i < routeData.length - 1; i++) {
            if (target >= routeData[i].x && target <= routeData[i+1].x) {
                const r = (target - routeData[i].x) / (routeData[i+1].x - routeData[i].x);
                return routeData[i].y + r * (routeData[i+1].y - routeData[i].y);
            }
        }
        return routeData[routeData.length - 1].y;
    }

    function loadKml(xml) {
        try {
            const dom = new DOMParser().parseFromString(xml, "text/xml");
            const geojson = toGeoJSON.kml(dom);
            let coords = [];
            geojson.features.forEach(f => {
                if (f.geometry.type === 'LineString') coords = coords.concat(f.geometry.coordinates);
                else if (f.geometry.type === 'MultiLineString') f.geometry.coordinates.forEach(line => { coords = coords.concat(line); });
            });
            if (coords.length > 0) { masterCoords = coords; localStorage.setItem('cycling_route_foss', xml); processRoutePoints(coords); }
        } catch(e) { console.error(e); }
    }

    function setupListeners() {
        document.getElementById('route-upload').onchange = (e) => {
            const r = new FileReader(); r.onload = (ev) => loadKml(ev.target.result); r.readAsText(e.target.files[0]);
        };
        document.getElementById('rev-btn').onclick = () => { if(masterCoords.length) { masterCoords.reverse(); processRoutePoints(masterCoords); } };
        document.getElementById('reset-btn').onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById('recenter-btn').onclick = function() { isFollowing = true; this.style.display = 'none'; };
        map.on('dblclick', () => map.setZoom(DEFAULT_ZOOM));
        document.getElementById('compass-ui').onclick = function() { isCourseUp = !isCourseUp; this.style.borderColor = isCourseUp ? '#fff' : '#444'; };
        map.on('dragstart zoomstart', () => { if (isFollowing) { isFollowing = false; document.getElementById('recenter-btn').style.display = 'block'; } });
        document.getElementById('fs-btn').onclick = () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); };
    }
    window.onload = init;
</script>
</body>
</html>
